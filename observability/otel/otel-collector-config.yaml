receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 15s
    container_labels_to_metric_labels:
      com.docker.compose.project: project
  prometheus:
    config:
      scrape_configs:
        - job_name: rabbitmq
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              port: 15692
              filters:
                - name: label
                  values: ["telemetry.scrape=rabbitmq"]
          relabel_configs:
            # rabbitmq expose plusieurs ports sur 2 réseaux -> docker_sd crée
            # une cible par (réseau, port). On ne garde que la bonne : réseau
            # observability (routable depuis le collector) + port métriques 15692.
            - source_labels: [__meta_docker_network_name, __meta_docker_port_private]
              regex: observability;15692
              action: keep
            - source_labels: [__meta_docker_container_label_com_docker_compose_project]
              target_label: project
            - source_labels: [__meta_docker_container_name]
              target_label: instance
              regex: /(.+)
              replacement: $1
        - job_name: demo-python
          metrics_path: /metrics
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              port: 8000
              filters:
                - name: label
                  values: ["telemetry.scrape=demo-python"]
          relabel_configs:
            # Le conteneur est sur 2 réseaux -> docker_sd crée une cible par
            # réseau. On ne garde que celle du réseau observability (la seule
            # routable depuis le collector), sinon la cible du réseau default
            # reste injoignable et maintient up=0 en permanence.
            - source_labels: [__meta_docker_network_name]
              regex: observability
              action: keep
            - source_labels: [__meta_docker_container_label_com_docker_compose_project]
              target_label: project
            - source_labels: [__meta_docker_container_name]
              target_label: instance
              regex: /(.+)
              replacement: $1
        - job_name: api
          metrics_path: /metrics
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              port: 8080
              filters:
                - name: label
                  values: ["telemetry.scrape=api"]
          relabel_configs:
            # Le conteneur est sur 2 réseaux -> docker_sd crée une cible par
            # réseau. On ne garde que celle du réseau observability (la seule
            # routable depuis le collector), sinon la cible du réseau default
            # reste injoignable et maintient up=0 en permanence.
            - source_labels: [__meta_docker_network_name]
              regex: observability
              action: keep
            - source_labels: [__meta_docker_container_label_com_docker_compose_project]
              target_label: project
            - source_labels: [__meta_docker_container_name]
              target_label: instance
              regex: /(.+)
              replacement: $1
        - job_name: worker
          metrics_path: /metrics
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              port: 9464
              filters:
                - name: label
                  values: ["telemetry.scrape=worker"]
          relabel_configs:
            # Le conteneur est sur 2 réseaux -> docker_sd crée une cible par
            # réseau. On ne garde que celle du réseau observability (la seule
            # routable depuis le collector), sinon la cible du réseau default
            # reste injoignable et maintient up=0 en permanence.
            - source_labels: [__meta_docker_network_name]
              regex: observability
              action: keep
            - source_labels: [__meta_docker_container_label_com_docker_compose_project]
              target_label: project
            - source_labels: [__meta_docker_container_name]
              target_label: instance
              regex: /(.+)
              replacement: $1

processors:
  batch:

exporters:
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheusremotewrite:
    endpoint: http://mimir:9009/api/v1/push
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp, docker_stats, prometheus]
      processors: [batch]
      exporters: [prometheusremotewrite]
