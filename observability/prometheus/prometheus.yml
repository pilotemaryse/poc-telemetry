global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]

  # Auto-discover any container labeled `telemetry.scrape=rabbitmq` across all projects.
  # Each project's rabbitmq sets this label so it gets picked up here automatically,
  # and the project label is extracted from compose metadata.
  - job_name: rabbitmq
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        port: 15692
        filters:
          - name: label
            values: ["telemetry.scrape=rabbitmq"]
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
      - source_labels: [__meta_docker_container_name]
        target_label: instance
        regex: /(.+)
        replacement: $1
