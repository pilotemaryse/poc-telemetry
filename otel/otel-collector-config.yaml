receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  opensearch:
    http:
      endpoint: http://opensearch:9200
    logs_index: otel-logs
  debug:
    verbosity: basic

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [opensearch, debug]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
